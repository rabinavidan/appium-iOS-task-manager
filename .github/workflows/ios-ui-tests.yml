name: iOS UI Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      ui_profile:
        description: "JUnit profile to run on the self-hosted iPhone runner"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - feature

permissions:
  contents: read

jobs:
  build-and-compile-tests:
    name: Build app and compile tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build iOS app without signing
        run: |
          xcodebuild \
            -scheme rabin-task-manager \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/rabin-task-manager-derived-data \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run API tests against mock backend
        working-directory: api-tests
        run: mvn test

      - name: Generate API Allure report
        if: always()
        working-directory: api-tests
        run: mvn allure:report

      - name: Upload API Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-report
          path: api-tests/target/allure-report
          if-no-files-found: ignore

      - name: Upload API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-artifacts
          path: |
            api-tests/target/allure-results
            api-tests/target/surefire-reports
          if-no-files-found: ignore

      - name: Publish API report summary
        if: always()
        run: |
          {
            echo "## API Test Report"
            echo ""
            echo "| Item | Location |"
            echo "| --- | --- |"
            echo "| Allure HTML report | Download artifact \`api-allure-report\` from this workflow run |"
            echo "| Raw Allure and Surefire files | Download artifact \`api-test-artifacts\` from this workflow run |"
            echo ""
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Compile Java UI tests
        working-directory: java-ui-tests
        run: mvn test -DskipTests

  real-device-smoke:
    name: Real-device Appium UI tests
    runs-on:
      - self-hosted
      - macOS
      - ios-device
    needs: build-and-compile-tests
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45

    env:
      APPIUM_SERVER_URL: http://127.0.0.1:4723
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      IOS_DEVICE_NAME: ${{ vars.IOS_DEVICE_NAME || 'iPhone' }}
      IOS_PLATFORM_VERSION: ${{ vars.IOS_PLATFORM_VERSION }}
      IOS_UDID: ${{ secrets.IOS_UDID || vars.IOS_UDID }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'rubisoft.rabin-task-manager' }}
      IOS_XCODE_ORG_ID: ${{ secrets.IOS_XCODE_ORG_ID || vars.IOS_XCODE_ORG_ID }}
      IOS_XCODE_SIGNING_ID: ${{ vars.IOS_XCODE_SIGNING_ID || 'Apple Development' }}
      IOS_UPDATED_WDA_BUNDLE_ID: ${{ vars.IOS_UPDATED_WDA_BUNDLE_ID }}
      IOS_DERIVED_DATA_PATH: /tmp/rabin-task-manager-wda-derived-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate real-device configuration
        run: |
          missing=0

          if [ -z "${IOS_UDID}" ]; then
            echo "::error title=Missing IOS_UDID::Set IOS_UDID in GitHub Actions Secrets or Variables. Without UDID, Appium falls back to simulator creation."
            missing=1
          fi

          if [ -z "${IOS_PLATFORM_VERSION}" ]; then
            echo "::error title=Missing IOS_PLATFORM_VERSION::Set IOS_PLATFORM_VERSION in GitHub Actions Variables, for example 26.5."
            missing=1
          fi

          if [ -z "${IOS_XCODE_ORG_ID}" ]; then
            echo "::error title=Missing IOS_XCODE_ORG_ID::Set IOS_XCODE_ORG_ID in GitHub Actions Secrets or Variables."
            missing=1
          fi

          if [ -z "${IOS_UPDATED_WDA_BUNDLE_ID}" ]; then
            echo "::error title=Missing IOS_UPDATED_WDA_BUNDLE_ID::Set IOS_UPDATED_WDA_BUNDLE_ID in GitHub Actions Variables."
            missing=1
          fi

          xcode-select -p
          xcodebuild -version

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

          if ! xcrun xctrace list devices | grep -F "${IOS_UDID}"; then
            echo "::error title=iPhone not visible to Xcode::Connect and unlock the iPhone, approve Trust This Computer, and make sure Developer Mode is enabled."
            exit 1
          fi

          {
            echo "## Real-Device Configuration"
            echo ""
            echo "| Key | Value |"
            echo "| --- | --- |"
            echo "| Device name | \`${IOS_DEVICE_NAME}\` |"
            echo "| Platform version | \`${IOS_PLATFORM_VERSION}\` |"
            echo "| Bundle id | \`${IOS_BUNDLE_ID}\` |"
            echo "| UDID configured | yes |"
            echo "| Xcode org id configured | yes |"
            echo "| WDA bundle id | \`${IOS_UPDATED_WDA_BUNDLE_ID}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest || true

      - name: Start Appium
        run: |
          appium --address 127.0.0.1 --port 4723 > /tmp/rabin-task-manager-appium.log 2>&1 &
          echo $! > /tmp/rabin-task-manager-appium.pid
          sleep 8

      - name: Run Appium UI tests
        working-directory: java-ui-tests
        run: |
          mvn test -P${{ inputs.ui_profile }} \
            -Dappium.server.url="${APPIUM_SERVER_URL}" \
            -Dios.device.name="${IOS_DEVICE_NAME}" \
            -Dios.platform.version="${IOS_PLATFORM_VERSION}" \
            -Dios.udid="${IOS_UDID}" \
            -Dios.bundle.id="${IOS_BUNDLE_ID}" \
            -Dios.derived.data.path="${IOS_DERIVED_DATA_PATH}" \
            -Dios.show.xcode.log="true" \
            -Dios.xcode.org.id="${IOS_XCODE_ORG_ID}" \
            -Dios.xcode.signing.id="${IOS_XCODE_SIGNING_ID}" \
            -Dios.xcode.config.file="${GITHUB_WORKSPACE}/java-ui-tests/wda-signing.xcconfig" \
            -Dios.updated.wda.bundle.id="${IOS_UPDATED_WDA_BUNDLE_ID}" \
            -Dios.allow.provisioning.device.registration="true" \
            -Dios.wda.launch.timeout="180000" \
            -Dios.wda.connection.timeout="180000" \
            -Dios.wait.seconds="30"

      - name: Generate Allure report
        if: always()
        working-directory: java-ui-tests
        run: mvn allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ inputs.ui_profile }}
          path: java-ui-tests/target/allure-report
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts-${{ inputs.ui_profile }}
          path: |
            java-ui-tests/target/allure-results
            java-ui-tests/target/surefire-reports
            java-ui-tests/target/logs
            /tmp/rabin-task-manager-appium.log
          if-no-files-found: ignore

      - name: Publish UI report summary
        if: always()
        run: |
          {
            echo "## Real-Device UI Test Report"
            echo ""
            echo "| Item | Location |"
            echo "| --- | --- |"
            echo "| Test profile | \`${{ inputs.ui_profile }}\` |"
            echo "| Allure HTML report | Download artifact \`allure-report-${{ inputs.ui_profile }}\` from this workflow run |"
            echo "| Raw Allure, Surefire, logs, Appium log | Download artifact \`ui-test-artifacts-${{ inputs.ui_profile }}\` from this workflow run |"
            echo ""
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop Appium
        if: always()
        run: |
          if [ -f /tmp/rabin-task-manager-appium.pid ]; then
            kill "$(cat /tmp/rabin-task-manager-appium.pid)" || true
          fi
